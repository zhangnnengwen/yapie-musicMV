<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频加歌词字幕生成器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            color: #172033;
            background:
                radial-gradient(circle at 18% 20%, rgba(255, 129, 121, 0.22), transparent 28%),
                radial-gradient(circle at 84% 14%, rgba(78, 205, 196, 0.2), transparent 30%),
                linear-gradient(135deg, #f7f8ff 0%, #eef6f4 46%, #fff4ee 100%);
            padding: 36px 20px;
        }

        .topbar {
            width: min(720px, 100%);
            margin: 0 auto 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .brand {
            color: #172033;
            font-size: 20px;
            font-weight: 800;
            text-decoration: none;
        }

        .back-link {
            padding: 8px 12px;
            border: 1px solid rgba(23, 32, 51, 0.12);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.7);
            color: #526173;
            font-size: 13px;
            text-decoration: none;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid rgba(23, 32, 51, 0.1);
            border-radius: 8px;
            box-shadow: 0 18px 42px rgba(23, 32, 51, 0.1);
            overflow: hidden;
        }

        .header {
            padding: 30px 32px 22px;
            border-bottom: 1px solid rgba(23, 32, 51, 0.08);
            background: rgba(255, 255, 255, 0.62);
        }

        .header h1 {
            color: #172033;
            font-size: 30px;
            line-height: 1.2;
            margin-bottom: 10px;
            letter-spacing: 0;
        }

        .header p {
            color: #526173;
            font-size: 15px;
            line-height: 1.6;
        }

        .content {
            padding: 30px 32px;
        }

        .upload-section,
        .settings-section {
            margin-bottom: 28px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 9px;
            margin-bottom: 14px;
            color: #172033;
            font-size: 16px;
            font-weight: 800;
        }

        .section-title::before {
            content: "";
            width: 4px;
            height: 18px;
            border-radius: 999px;
            background: #0f766e;
        }

        .upload-area {
            border: 1.5px dashed rgba(23, 32, 51, 0.22);
            border-radius: 8px;
            padding: 28px;
            text-align: center;
            transition: all 0.2s ease;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.62);
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: #0f766e;
            background: rgba(78, 205, 196, 0.09);
        }

        .upload-area.has-file {
            border-color: #0f766e;
            background: rgba(78, 205, 196, 0.13);
        }

        .upload-icon {
            font-size: 42px;
            margin-bottom: 12px;
            color: #526173;
        }

        .upload-text {
            color: #172033;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .upload-hint,
        .file-size,
        .footer {
            color: #526173;
            font-size: 12px;
        }

        .file-info {
            margin-top: 16px;
            padding: 12px;
            background: #fff;
            border: 1px solid rgba(23, 32, 51, 0.08);
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 20px rgba(23, 32, 51, 0.06);
        }

        .file-icon {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            background: #0f766e;
        }

        .file-icon.video {
            background: #172033;
        }

        .file-name {
            flex: 1;
            color: #172033;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .remove-btn {
            width: 28px;
            height: 28px;
            border: 1px solid rgba(23, 32, 51, 0.1);
            border-radius: 999px;
            background: #fff;
            color: #526173;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .remove-btn:hover {
            background: #fff2f0;
            border-color: #ffccc7;
            color: #c2410c;
        }

        .hidden {
            display: none;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .setting-item label {
            color: #526173;
            font-size: 14px;
            font-weight: 700;
        }

        .setting-item input,
        .setting-item select {
            width: 100%;
            min-height: 44px;
            padding: 10px 12px;
            border: 1px solid rgba(23, 32, 51, 0.14);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            color: #172033;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .setting-item input:focus,
        .setting-item select:focus {
            border-color: #0f766e;
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
        }

        .setting-item input[type="color"] {
            padding: 4px;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            min-height: 50px;
            padding: 0 18px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }

        .btn-primary,
        .btn-success,
        .download-link {
            background: #172033;
            color: #fff;
            box-shadow: 0 12px 24px rgba(23, 32, 51, 0.16);
        }

        .btn-primary:hover:not(:disabled),
        .btn-success:hover,
        .download-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 30px rgba(23, 32, 51, 0.2);
        }

        .btn-primary:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .progress-container {
            margin-top: 22px;
            display: none;
        }

        .progress-bar {
            height: 9px;
            background: rgba(23, 32, 51, 0.1);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: #0f766e;
            border-radius: 999px;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            margin-top: 10px;
            color: #526173;
            font-size: 14px;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .message.success {
            background: rgba(78, 205, 196, 0.12);
            border: 1px solid rgba(15, 118, 110, 0.18);
            color: #0f766e;
            display: block;
        }

        .message.error {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #c2410c;
            display: block;
        }

        .download-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            margin-top: 10px;
            padding: 0 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .footer {
            padding: 18px 30px;
            border-top: 1px solid rgba(23, 32, 51, 0.08);
            background: rgba(255, 255, 255, 0.5);
            text-align: center;
        }

        @media (max-width: 640px) {
            body {
                padding: 24px 14px;
            }

            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .content,
            .header {
                padding-left: 22px;
                padding-right: 22px;
            }

            .settings-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <a class="brand" href="/">音乐 MV 工具</a>
        <a class="back-link" href="/">返回首页</a>
    </div>
    <div class="container">
        <div class="header">
            <h1>🎵 视频加歌词字幕生成器</h1>
            <p>上传视频和LRC歌词文件，自动生成带同步字幕的视频</p>
        </div>

        <div class="content">
            <form id="uploadForm" enctype="multipart/form-data">
                <!-- 视频上传 -->
                <div class="upload-section">
                    <div class="section-title">视频文件</div>
                    <div class="upload-area" id="videoUpload">
                        <div class="upload-icon">🎬</div>
                        <div class="upload-text">点击或拖拽上传视频文件</div>
                        <div class="upload-hint">支持 MP4, MOV, AVI 等格式</div>
                        <input type="file" id="videoFile" name="video" accept="video/*" class="hidden">
                        <div id="videoFileInfo" class="file-info hidden">
                            <div class="file-icon video">🎬</div>
                            <div class="file-name" id="videoFileName"></div>
                            <div class="file-size" id="videoFileSize"></div>
                            <button type="button" class="remove-btn" onclick="removeFile('video')">×</button>
                        </div>
                    </div>
                </div>

                <!-- 歌词上传 -->
                <div class="upload-section">
                    <div class="section-title">歌词文件</div>
                    <div class="upload-area" id="lrcUpload">
                        <div class="upload-icon">📝</div>
                        <div class="upload-text">点击或拖拽上传LRC歌词文件</div>
                        <div class="upload-hint">格式: [00:00.00]歌词内容</div>
                        <input type="file" id="lrcFile" name="lrc" accept=".lrc" class="hidden">
                        <div id="lrcFileInfo" class="file-info hidden">
                            <div class="file-icon lrc">📝</div>
                            <div class="file-name" id="lrcFileName"></div>
                            <div class="file-size" id="lrcFileSize"></div>
                            <button type="button" class="remove-btn" onclick="removeFile('lrc')">×</button>
                        </div>
                    </div>
                </div>

                <!-- 设置选项 -->
                <div class="settings-section">
                    <div class="section-title">字幕设置</div>
                    <div class="settings-grid">
                        <div class="setting-item">
                            <label>字体大小</label>
                            <input type="number" name="fontsize" value="48" min="12" max="120">
                        </div>
                        <div class="setting-item">
                            <label>字体颜色</label>
                            <input type="color" name="fontcolor" value="#ffffff">
                        </div>
                        <div class="setting-item">
                            <label>背景透明度</label>
                            <input type="range" name="bgalpha" value="0.3" min="0" max="1" step="0.1">
                        </div>
                        <div class="setting-item">
                            <label>字幕位置</label>
                            <select name="position">
                                <option value="bottom">底部</option>
                                <option value="center">居中</option>
                                <option value="top">顶部</option>
                            </select>
                        </div>
                        <div class="setting-item">
                            <label>边距(像素)</label>
                            <input type="number" name="margin" value="50" min="0" max="200">
                        </div>
                        <div class="setting-item">
                            <label>显示开场标题</label>
                            <label class="toggle-switch">
                                <input type="checkbox" name="showtitle" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="setting-item">
                            <label>标题时长(秒)</label>
                            <input type="number" name="titleduration" value="5" min="1" max="10">
                        </div>
                    </div>
                </div>

                <!-- 生成按钮 -->
                <button type="submit" class="btn btn-primary" id="generateBtn">
                    🚀 开始生成
                </button>
            </form>

            <!-- 进度条 -->
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress" id="progress"></div>
                </div>
                <div class="progress-text" id="progressText">正在生成视频...</div>
            </div>

            <!-- 消息提示 -->
            <div class="message" id="message"></div>
        </div>

        <div class="footer">
            支持批量处理 • 自定义字幕样式 • 高质量输出
        </div>
    </div>

    <script>
        // 文件上传处理
        const videoUpload = document.getElementById('videoUpload');
        const lrcUpload = document.getElementById('lrcUpload');
        const videoFile = document.getElementById('videoFile');
        const lrcFile = document.getElementById('lrcFile');

        videoUpload.addEventListener('click', () => videoFile.click());
        lrcUpload.addEventListener('click', () => lrcFile.click());

        // 拖拽上传
        [videoUpload, lrcUpload].forEach(area => {
            area.addEventListener('dragover', (e) => {
                e.preventDefault();
                area.classList.add('dragover');
            });

            area.addEventListener('dragleave', () => {
                area.classList.remove('dragover');
            });

            area.addEventListener('drop', (e) => {
                e.preventDefault();
                area.classList.remove('dragover');
                
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    if (area.id === 'videoUpload') {
                        videoFile.files = files;
                        handleFileSelect('video', files[0]);
                    } else {
                        lrcFile.files = files;
                        handleFileSelect('lrc', files[0]);
                    }
                }
            });
        });

        // 文件选择处理
        videoFile.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect('video', e.target.files[0]);
            }
        });

        lrcFile.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect('lrc', e.target.files[0]);
            }
        });

        function handleFileSelect(type, file) {
            const fileName = document.getElementById(`${type}FileName`);
            const fileSize = document.getElementById(`${type}FileSize`);
            const fileInfo = document.getElementById(`${type}FileInfo`);
            const uploadArea = document.getElementById(`${type}Upload`);

            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            fileInfo.classList.remove('hidden');
            uploadArea.classList.add('has-file');

            checkFormValidity();
        }

        function removeFile(type) {
            const fileInput = document.getElementById(`${type}File`);
            const fileInfo = document.getElementById(`${type}FileInfo`);
            const uploadArea = document.getElementById(`${type}Upload`);

            fileInput.value = '';
            fileInfo.classList.add('hidden');
            uploadArea.classList.remove('has-file');

            checkFormValidity();
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function checkFormValidity() {
            const generateBtn = document.getElementById('generateBtn');
            const hasVideo = videoFile.files.length > 0;
            const hasLrc = lrcFile.files.length > 0;
            generateBtn.disabled = !(hasVideo && hasLrc);
        }

        // 表单提交
        const form = document.getElementById('uploadForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(form);
            const generateBtn = document.getElementById('generateBtn');
            const progressContainer = document.getElementById('progressContainer');
            const progress = document.getElementById('progress');
            const progressText = document.getElementById('progressText');
            const message = document.getElementById('message');

            // 显示进度
            generateBtn.disabled = true;
            generateBtn.textContent = '生成中...';
            progressContainer.style.display = 'block';
            progress.style.width = '30%';
            message.style.display = 'none';

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    progress.style.width = '100%';
                    progressText.textContent = '生成完成！';
                    
                    message.className = 'message success';
                    message.innerHTML = `
                        <div>✓ ${result.message}</div>
                        <a href="${result.download_url}" class="download-link">📥 下载视频</a>
                    `;
                    message.style.display = 'block';
                } else {
                    message.className = 'message error';
                    message.textContent = `✗ ${result.message}`;
                    message.style.display = 'block';
                }
            } catch (error) {
                message.className = 'message error';
                message.textContent = `✗ 请求失败: ${error.message}`;
                message.style.display = 'block';
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = '🚀 开始生成';
            }
        });
    </script>
</body>
</html>
