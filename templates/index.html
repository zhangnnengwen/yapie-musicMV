<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频加歌词字幕生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .upload-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            border-radius: 2px;
        }

        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            background: #fafafa;
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: #ff6b6b;
            background: #fff5f5;
        }

        .upload-area.has-file {
            border-color: #52c41a;
            background: #f6ffed;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
            color: #999;
        }

        .upload-area:hover .upload-icon,
        .upload-area.dragover .upload-icon {
            color: #ff6b6b;
        }

        .upload-text {
            font-size: 16px;
            color: #666;
            margin-bottom: 8px;
        }

        .upload-hint {
            font-size: 12px;
            color: #999;
        }

        .file-info {
            margin-top: 15px;
            padding: 12px;
            background: #fff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .file-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .file-icon.video {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .file-icon.lrc {
            background: linear-gradient(135deg, #52c41a, #389e0d);
            color: white;
        }

        .file-name {
            flex: 1;
            font-size: 14px;
            color: #333;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-size {
            font-size: 12px;
            color: #999;
        }

        .remove-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: #f5f5f5;
            color: #999;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .remove-btn:hover {
            background: #ff4d4f;
            color: white;
        }

        .hidden {
            display: none;
        }

        .settings-section {
            margin-bottom: 30px;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .setting-item label {
            font-size: 14px;
            color: #666;
        }

        .setting-item input,
        .setting-item select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
            outline: none;
        }

        .setting-item input:focus,
        .setting-item select:focus {
            border-color: #ff6b6b;
        }

        .setting-item input[type="color"] {
            padding: 2px;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.5);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-success {
            background: linear-gradient(135deg, #52c41a 0%, #389e0d 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(82, 196, 26, 0.4);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(82, 196, 26, 0.5);
        }

        .progress-container {
            margin-top: 20px;
            display: none;
        }

        .progress-bar {
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ee5a5a);
            border-radius: 4px;
            transition: width 0.3s ease;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .progress-text {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .message.success {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            color: #52c41a;
            display: block;
        }

        .message.error {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
            display: block;
        }

        .download-link {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #52c41a 0%, #389e0d 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .download-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(82, 196, 26, 0.4);
        }

        .footer {
            padding: 20px 30px;
            background: #fafafa;
            text-align: center;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 视频加歌词字幕生成器</h1>
            <p>上传视频和LRC歌词文件，自动生成带同步字幕的视频</p>
        </div>

        <div class="content">
            <form id="uploadForm" enctype="multipart/form-data">
                <!-- 视频上传 -->
                <div class="upload-section">
                    <div class="section-title">视频文件</div>
                    <div class="upload-area" id="videoUpload">
                        <div class="upload-icon">🎬</div>
                        <div class="upload-text">点击或拖拽上传视频文件</div>
                        <div class="upload-hint">支持 MP4, MOV, AVI 等格式</div>
                        <input type="file" id="videoFile" name="video" accept="video/*" class="hidden">
                        <div id="videoFileInfo" class="file-info hidden">
                            <div class="file-icon video">🎬</div>
                            <div class="file-name" id="videoFileName"></div>
                            <div class="file-size" id="videoFileSize"></div>
                            <button type="button" class="remove-btn" onclick="removeFile('video')">×</button>
                        </div>
                    </div>
                </div>

                <!-- 歌词上传 -->
                <div class="upload-section">
                    <div class="section-title">歌词文件</div>
                    <div class="upload-area" id="lrcUpload">
                        <div class="upload-icon">📝</div>
                        <div class="upload-text">点击或拖拽上传LRC歌词文件</div>
                        <div class="upload-hint">格式: [00:00.00]歌词内容</div>
                        <input type="file" id="lrcFile" name="lrc" accept=".lrc" class="hidden">
                        <div id="lrcFileInfo" class="file-info hidden">
                            <div class="file-icon lrc">📝</div>
                            <div class="file-name" id="lrcFileName"></div>
                            <div class="file-size" id="lrcFileSize"></div>
                            <button type="button" class="remove-btn" onclick="removeFile('lrc')">×</button>
                        </div>
                    </div>
                </div>

                <!-- 设置选项 -->
                <div class="settings-section">
                    <div class="section-title">字幕设置</div>
                    <div class="settings-grid">
                        <div class="setting-item">
                            <label>字体大小</label>
                            <input type="number" name="fontsize" value="48" min="12" max="120">
                        </div>
                        <div class="setting-item">
                            <label>字体颜色</label>
                            <input type="color" name="fontcolor" value="#ffffff">
                        </div>
                        <div class="setting-item">
                            <label>背景透明度</label>
                            <input type="range" name="bgalpha" value="0.3" min="0" max="1" step="0.1">
                        </div>
                        <div class="setting-item">
                            <label>字幕位置</label>
                            <select name="position">
                                <option value="bottom">底部</option>
                                <option value="center">居中</option>
                                <option value="top">顶部</option>
                            </select>
                        </div>
                        <div class="setting-item">
                            <label>边距(像素)</label>
                            <input type="number" name="margin" value="50" min="0" max="200">
                        </div>
                        <div class="setting-item">
                            <label>显示开场标题</label>
                            <label class="toggle-switch">
                                <input type="checkbox" name="showtitle" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="setting-item">
                            <label>标题时长(秒)</label>
                            <input type="number" name="titleduration" value="5" min="1" max="10">
                        </div>
                    </div>
                </div>

                <!-- 生成按钮 -->
                <button type="submit" class="btn btn-primary" id="generateBtn">
                    🚀 开始生成
                </button>
            </form>

            <!-- 进度条 -->
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress" id="progress"></div>
                </div>
                <div class="progress-text" id="progressText">正在生成视频...</div>
            </div>

            <!-- 消息提示 -->
            <div class="message" id="message"></div>
        </div>

        <div class="footer">
            支持批量处理 • 自定义字幕样式 • 高质量输出
        </div>
    </div>

    <script>
        // 文件上传处理
        const videoUpload = document.getElementById('videoUpload');
        const lrcUpload = document.getElementById('lrcUpload');
        const videoFile = document.getElementById('videoFile');
        const lrcFile = document.getElementById('lrcFile');

        videoUpload.addEventListener('click', () => videoFile.click());
        lrcUpload.addEventListener('click', () => lrcFile.click());

        // 拖拽上传
        [videoUpload, lrcUpload].forEach(area => {
            area.addEventListener('dragover', (e) => {
                e.preventDefault();
                area.classList.add('dragover');
            });

            area.addEventListener('dragleave', () => {
                area.classList.remove('dragover');
            });

            area.addEventListener('drop', (e) => {
                e.preventDefault();
                area.classList.remove('dragover');
                
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    if (area.id === 'videoUpload') {
                        videoFile.files = files;
                        handleFileSelect('video', files[0]);
                    } else {
                        lrcFile.files = files;
                        handleFileSelect('lrc', files[0]);
                    }
                }
            });
        });

        // 文件选择处理
        videoFile.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect('video', e.target.files[0]);
            }
        });

        lrcFile.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect('lrc', e.target.files[0]);
            }
        });

        function handleFileSelect(type, file) {
            const fileName = document.getElementById(`${type}FileName`);
            const fileSize = document.getElementById(`${type}FileSize`);
            const fileInfo = document.getElementById(`${type}FileInfo`);
            const uploadArea = document.getElementById(`${type}Upload`);

            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            fileInfo.classList.remove('hidden');
            uploadArea.classList.add('has-file');

            checkFormValidity();
        }

        function removeFile(type) {
            const fileInput = document.getElementById(`${type}File`);
            const fileInfo = document.getElementById(`${type}FileInfo`);
            const uploadArea = document.getElementById(`${type}Upload`);

            fileInput.value = '';
            fileInfo.classList.add('hidden');
            uploadArea.classList.remove('has-file');

            checkFormValidity();
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function checkFormValidity() {
            const generateBtn = document.getElementById('generateBtn');
            const hasVideo = videoFile.files.length > 0;
            const hasLrc = lrcFile.files.length > 0;
            generateBtn.disabled = !(hasVideo && hasLrc);
        }

        // 表单提交
        const form = document.getElementById('uploadForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(form);
            const generateBtn = document.getElementById('generateBtn');
            const progressContainer = document.getElementById('progressContainer');
            const progress = document.getElementById('progress');
            const progressText = document.getElementById('progressText');
            const message = document.getElementById('message');

            // 显示进度
            generateBtn.disabled = true;
            generateBtn.textContent = '生成中...';
            progressContainer.style.display = 'block';
            progress.style.width = '30%';
            message.style.display = 'none';

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    progress.style.width = '100%';
                    progressText.textContent = '生成完成！';
                    
                    message.className = 'message success';
                    message.innerHTML = `
                        <div>✓ ${result.message}</div>
                        <a href="${result.download_url}" class="download-link">📥 下载视频</a>
                    `;
                    message.style.display = 'block';
                } else {
                    message.className = 'message error';
                    message.textContent = `✗ ${result.message}`;
                    message.style.display = 'block';
                }
            } catch (error) {
                message.className = 'message error';
                message.textContent = `✗ 请求失败: ${error.message}`;
                message.style.display = 'block';
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = '🚀 开始生成';
            }
        });
    </script>
</body>
</html>
