<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunningHub MV 视频生成器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            color: #172033;
            background: #f4f7f6;
            padding: 32px 18px;
        }

        .topbar,
        .container {
            width: min(1040px, 100%);
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .brand {
            color: #172033;
            font-size: 20px;
            font-weight: 800;
            text-decoration: none;
        }

        .back-link {
            padding: 8px 12px;
            border: 1px solid rgba(23, 32, 51, 0.14);
            border-radius: 8px;
            background: #fff;
            color: #526173;
            font-size: 13px;
            text-decoration: none;
        }

        .container {
            padding: 28px;
            border: 1px solid rgba(23, 32, 51, 0.1);
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 16px 36px rgba(23, 32, 51, 0.08);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 24px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(23, 32, 51, 0.08);
        }

        .header h1 {
            margin-bottom: 8px;
            font-size: 30px;
            line-height: 1.2;
            letter-spacing: 0;
        }

        .header p,
        .hint,
        .status-text,
        .file-name {
            color: #526173;
            font-size: 13px;
            line-height: 1.55;
        }

        .mode-tabs {
            display: inline-flex;
            flex: 0 0 auto;
            padding: 4px;
            border: 1px solid rgba(23, 32, 51, 0.12);
            border-radius: 8px;
            background: #f8faf9;
        }

        .mode-tab {
            min-height: 36px;
            padding: 0 14px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: #526173;
            font-weight: 800;
            cursor: pointer;
        }

        .mode-tab.active {
            background: #172033;
            color: #fff;
        }

        .grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
            gap: 20px;
            align-items: start;
        }

        .section {
            margin-bottom: 18px;
            padding: 22px;
            border: 1px solid rgba(23, 32, 51, 0.1);
            border-radius: 8px;
            background: #fbfcfc;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            font-size: 17px;
            font-weight: 800;
        }

        .step-number {
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            border-radius: 8px;
            background: #0f766e;
            color: #fff;
            font-size: 13px;
            font-weight: 800;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            color: #172033;
            font-size: 14px;
            font-weight: 800;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            min-height: 42px;
            padding: 10px 12px;
            border: 1px solid rgba(23, 32, 51, 0.14);
            border-radius: 8px;
            background: #fff;
            color: #172033;
            font-size: 14px;
            outline: none;
        }

        textarea {
            min-height: 88px;
            resize: vertical;
            font-family: Consolas, "Courier New", monospace;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #0f766e;
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
        }

        .upload-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .upload-area {
            min-height: 116px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            border: 1.5px dashed rgba(23, 32, 51, 0.22);
            border-radius: 8px;
            background: #fff;
            text-align: center;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: #0f766e;
            background: rgba(15, 118, 110, 0.04);
        }

        .upload-title {
            color: #172033;
            font-size: 14px;
            font-weight: 800;
        }

        .file-name {
            min-height: 20px;
            word-break: break-all;
        }

        .hidden {
            display: none;
        }

        .advanced {
            display: none;
        }

        .advanced.show,
        .split-only.show {
            display: block;
        }

        .split-only {
            display: none;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            min-height: 44px;
            padding: 0 18px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
        }

        .btn-primary {
            background: #172033;
            color: #fff;
            box-shadow: 0 10px 20px rgba(23, 32, 51, 0.14);
        }

        .btn-secondary {
            border: 1px solid rgba(23, 32, 51, 0.14);
            background: #fff;
            color: #526173;
        }

        .btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            box-shadow: none;
        }

        .result-section {
            display: none;
            padding: 22px;
            border: 1px solid rgba(23, 32, 51, 0.1);
            border-radius: 8px;
            background: #fbfcfc;
        }

        .result-section.show {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            margin: 14px 0;
            border-radius: 999px;
            background: rgba(23, 32, 51, 0.1);
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            border-radius: 999px;
            background: #0f766e;
            transition: width 0.25s ease;
        }

        .video-result {
            margin-top: 16px;
            text-align: center;
        }

        .video-result video {
            width: 100%;
            max-height: 560px;
            border-radius: 8px;
            background: #000;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            margin-top: 14px;
            padding: 0 16px;
            border-radius: 8px;
            background: #172033;
            color: #fff;
            text-decoration: none;
            font-weight: 800;
        }

        .meta-list {
            display: grid;
            gap: 8px;
            margin-top: 12px;
            color: #526173;
            font-size: 13px;
        }

        @media (max-width: 860px) {
            body {
                padding: 22px 12px;
            }

            .header,
            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .grid,
            .upload-grid,
            .form-row {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 18px;
            }

            .header h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <a class="brand" href="/">音乐 MV 工具</a>
        <a class="back-link" href="/">返回首页</a>
    </div>

    <main class="container">
        <div class="header">
            <div>
                <h1>RunningHub MV 视频生成器</h1>
                <p>上传图片和音频生成视频；长音频可自动寻找低能量无歌词切点，分两段并发生成后合并。</p>
            </div>
            <div class="mode-tabs" aria-label="生成模式">
                <button type="button" class="mode-tab active" id="singleModeBtn" onclick="setMode('single')">单段生成</button>
                <button type="button" class="mode-tab" id="splitModeBtn" onclick="setMode('split')">自动分段</button>
            </div>
        </div>

        <div class="grid">
            <div>
                <section class="section">
                    <div class="section-title">
                        <span class="step-number">1</span>
                        RunningHub 配置
                    </div>
                    <div class="form-group">
                        <label for="apiKey">API Key *</label>
                        <input type="text" id="apiKey" autocomplete="off" placeholder="输入 RunningHub API Key">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="workflowId">Workflow ID *</label>
                            <input type="text" id="workflowId" value="2025258518208737281">
                        </div>
                        <div class="form-group">
                            <label for="retainSeconds">结果保留秒数</label>
                            <input type="number" id="retainSeconds" min="0" placeholder="可选">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="imageNodeId">图片节点 ID *</label>
                            <input type="text" id="imageNodeId" value="343">
                            <div class="hint">默认字段名 image</div>
                        </div>
                        <div class="form-group">
                            <label for="audioNodeId">音频节点 ID *</label>
                            <input type="text" id="audioNodeId" value="243">
                            <div class="hint">默认字段名 audio</div>
                        </div>
                    </div>
                    <button type="button" class="btn btn-secondary" onclick="toggleAdvanced()">高级参数</button>
                    <div class="advanced" id="advancedPanel">
                        <div class="form-row" style="margin-top: 16px;">
                            <div class="form-group">
                                <label for="instanceType">Instance Type</label>
                                <input type="text" id="instanceType" placeholder="default / plus，可选">
                            </div>
                            <div class="form-group">
                                <label for="accessPassword">访问密码</label>
                                <input type="text" id="accessPassword" placeholder="加密应用可填">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="nodeInfoList">额外 nodeInfoList JSON</label>
                            <textarea id="nodeInfoList">[]</textarea>
                            <div class="hint">图片和音频节点会自动写入；这里只填 prompt、seed、风格等额外节点。</div>
                        </div>
                    </div>
                </section>

                <section class="section">
                    <div class="section-title">
                        <span class="step-number">2</span>
                        上传输入文件
                    </div>
                    <div class="upload-grid">
                        <label class="upload-area" for="imageFile">
                            <span class="upload-title">上传参考图片 *</span>
                            <span class="file-name" id="imageFileName">未选择文件</span>
                            <input type="file" id="imageFile" class="hidden" accept="image/*" onchange="handleFile(this, 'image')">
                        </label>
                        <label class="upload-area" for="audioFile">
                            <span class="upload-title">上传完整音频 *</span>
                            <span class="file-name" id="audioFileName">未选择文件</span>
                            <input type="file" id="audioFile" class="hidden" accept="audio/*,.mp3,.wav,.flac,.m4a" onchange="handleFile(this, 'audio')">
                        </label>
                    </div>
                    <div class="split-only" id="splitUploadPanel" style="margin-top: 14px;">
                        <label class="upload-area" for="lrcFile">
                            <span class="upload-title">上传 LRC 歌词文件</span>
                            <span class="file-name" id="lrcFileName">可选；上传后优先避开歌词段</span>
                            <input type="file" id="lrcFile" class="hidden" accept=".lrc,text/plain" onchange="handleFile(this, 'lrc')">
                        </label>
                    </div>
                </section>

                <section class="section split-only" id="splitConfigPanel">
                    <div class="section-title">
                        <span class="step-number">3</span>
                        分段与合并参数
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="overlapSeconds">Overlap 秒数</label>
                            <input type="number" id="overlapSeconds" min="0" step="0.1" value="1.0">
                        </div>
                        <div class="form-group">
                            <label for="xfadeSeconds">交叉淡化秒数</label>
                            <input type="number" id="xfadeSeconds" min="0" step="0.1" value="0.5">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="searchWindow">中点搜索窗口</label>
                            <input type="number" id="searchWindow" min="5" step="1" value="45">
                        </div>
                        <div class="form-group">
                            <label for="minPartSeconds">最短分段秒数</label>
                            <input type="number" id="minPartSeconds" min="1" step="1" value="30">
                        </div>
                    </div>
                    <div class="hint">最终视频会使用原始完整音频作为音轨，减少两段音频边界错位。</div>
                </section>
            </div>

            <aside>
                <section class="section">
                    <div class="section-title">
                        <span class="step-number">4</span>
                        开始生成
                    </div>
                    <div class="btn-row">
                        <button type="button" class="btn btn-primary" id="generateBtn" onclick="startGeneration()">开始生成视频</button>
                    </div>
                    <div class="meta-list" id="modeNotes">
                        <div>当前模式：单段生成。</div>
                        <div>适合短音频或 RunningHub 不易超时的任务。</div>
                    </div>
                </section>

                <section class="result-section" id="resultSection">
                    <div class="section-title">
                        <span class="step-number">5</span>
                        生成进度
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="status-text" id="statusText">等待开始</div>
                    <div class="meta-list" id="splitMeta"></div>
                    <div class="video-result" id="videoResult"></div>
                </section>
            </aside>
        </div>
    </main>

    <script>
        let selectedImage = null;
        let selectedAudio = null;
        let selectedLrc = null;
        let currentMode = 'single';
        let activePoller = null;

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('singleModeBtn').classList.toggle('active', mode === 'single');
            document.getElementById('splitModeBtn').classList.toggle('active', mode === 'split');
            document.querySelectorAll('.split-only').forEach((node) => {
                node.classList.toggle('show', mode === 'split');
            });
            document.getElementById('modeNotes').innerHTML = mode === 'split'
                ? '<div>当前模式：自动分段。</div><div>会自动找切点、并发生成两段，再用原始音频合并。</div>'
                : '<div>当前模式：单段生成。</div><div>适合短音频或 RunningHub 不易超时的任务。</div>';
        }

        function toggleAdvanced() {
            document.getElementById('advancedPanel').classList.toggle('show');
        }

        function handleFile(input, type) {
            const file = input.files[0] || null;
            if (type === 'image') {
                selectedImage = file;
                document.getElementById('imageFileName').textContent = file ? file.name : '未选择文件';
            } else if (type === 'audio') {
                selectedAudio = file;
                document.getElementById('audioFileName').textContent = file ? file.name : '未选择文件';
            } else if (type === 'lrc') {
                selectedLrc = file;
                document.getElementById('lrcFileName').textContent = file ? file.name : '可选；上传后优先避开歌词段';
            }
        }

        function getBaseFormData() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const workflowId = document.getElementById('workflowId').value.trim();
            const imageNodeId = document.getElementById('imageNodeId').value.trim();
            const audioNodeId = document.getElementById('audioNodeId').value.trim();

            if (!apiKey || !workflowId || !imageNodeId || !audioNodeId) {
                throw new Error('请填写 API Key、Workflow ID、图片节点 ID 和音频节点 ID');
            }
            if (!selectedImage) {
                throw new Error('请先上传参考图片');
            }
            if (!selectedAudio) {
                throw new Error('请先上传完整音频');
            }

            let nodeInfoList = [];
            try {
                nodeInfoList = JSON.parse(document.getElementById('nodeInfoList').value || '[]');
                if (!Array.isArray(nodeInfoList)) {
                    throw new Error();
                }
            } catch (error) {
                throw new Error('额外 nodeInfoList 必须是 JSON 数组');
            }

            const formData = new FormData();
            formData.append('apiKey', apiKey);
            formData.append('workflowId', workflowId);
            formData.append('imageNodeId', imageNodeId);
            formData.append('imageFieldName', 'image');
            formData.append('audioNodeId', audioNodeId);
            formData.append('audioFieldName', 'audio');
            formData.append('nodeInfoList', JSON.stringify(nodeInfoList));
            formData.append('image', selectedImage);
            formData.append('audio', selectedAudio);

            const retainSeconds = document.getElementById('retainSeconds').value.trim();
            const instanceType = document.getElementById('instanceType').value.trim();
            const accessPassword = document.getElementById('accessPassword').value.trim();
            if (retainSeconds) formData.append('retainSeconds', retainSeconds);
            if (instanceType) formData.append('instanceType', instanceType);
            if (accessPassword) formData.append('accessPassword', accessPassword);
            return formData;
        }

        function setBusy(isBusy) {
            const btn = document.getElementById('generateBtn');
            btn.disabled = isBusy;
            btn.textContent = isBusy ? '生成中...' : '开始生成视频';
        }

        function showProgress(progress, message) {
            document.getElementById('resultSection').classList.add('show');
            document.getElementById('progressFill').style.width = `${Math.max(0, Math.min(progress, 100))}%`;
            document.getElementById('statusText').textContent = message;
        }

        function resetResult() {
            if (activePoller) {
                clearInterval(activePoller);
                activePoller = null;
            }
            document.getElementById('videoResult').innerHTML = '';
            document.getElementById('splitMeta').innerHTML = '';
            showProgress(8, '正在提交任务...');
        }

        async function startGeneration() {
            try {
                resetResult();
                setBusy(true);
                if (currentMode === 'split') {
                    await generateSplitVideo();
                } else {
                    await generateSingleVideo();
                }
            } catch (error) {
                showProgress(0, `错误：${error.message}`);
                setBusy(false);
            }
        }

        async function generateSingleVideo() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const formData = getBaseFormData();
            showProgress(12, '正在上传图片和音频，并创建 RunningHub 任务...');

            const response = await fetch('/api/generate-video', { method: 'POST', body: formData });
            const result = await response.json();
            if (!result.success) {
                throw new Error(result.message || '任务创建失败');
            }

            showProgress(20, `任务已创建：${result.taskId}`);
            pollRunningHubTask(result.taskId, apiKey);
        }

        async function generateSplitVideo() {
            const formData = getBaseFormData();
            if (selectedLrc) {
                formData.append('lrc', selectedLrc);
            }
            formData.append('overlapSeconds', document.getElementById('overlapSeconds').value || '1.0');
            formData.append('xfadeSeconds', document.getElementById('xfadeSeconds').value || '0.5');
            formData.append('searchWindow', document.getElementById('searchWindow').value || '45');
            formData.append('minPartSeconds', document.getElementById('minPartSeconds').value || '30');

            showProgress(10, '正在保存文件并启动分段任务...');
            const response = await fetch('/api/generate-split-video', { method: 'POST', body: formData });
            const result = await response.json();
            if (!result.success) {
                throw new Error(result.message || '分段任务创建失败');
            }
            showProgress(12, `分段任务已启动：${result.jobId}`);
            pollSplitJob(result.jobId);
        }

        function pollRunningHubTask(taskId, apiKey) {
            let progress = 20;
            activePoller = setInterval(async () => {
                try {
                    const response = await fetch(`/api/task-status/${taskId}?apiKey=${encodeURIComponent(apiKey)}`);
                    const result = await response.json();
                    if (!result.success) {
                        showProgress(progress, `查询失败：${result.message}`);
                        return;
                    }

                    if (result.taskStatus === 'QUEUED') {
                        progress = Math.min(progress + 2, 40);
                        showProgress(progress, 'RunningHub 任务排队中...');
                    } else if (result.taskStatus === 'RUNNING') {
                        progress = Math.min(progress + 5, 90);
                        showProgress(progress, `RunningHub 正在生成... ${result.progress || progress}%`);
                    } else if (result.taskStatus === 'SUCCESS') {
                        clearInterval(activePoller);
                        activePoller = null;
                        showProgress(100, '视频生成成功');
                        renderRemoteResult(result);
                        setBusy(false);
                    } else if (result.taskStatus === 'FAILED') {
                        clearInterval(activePoller);
                        activePoller = null;
                        showProgress(0, `视频生成失败${result.message ? `：${result.message}` : ''}`);
                        setBusy(false);
                    }
                } catch (error) {
                    console.error(error);
                }
            }, 3000);
        }

        function pollSplitJob(jobId) {
            activePoller = setInterval(async () => {
                try {
                    const response = await fetch(`/api/split-job-status/${jobId}`);
                    const result = await response.json();
                    if (!result.success) {
                        showProgress(0, `查询失败：${result.message}`);
                        return;
                    }

                    showProgress(result.progress || 0, result.message || '分段任务处理中...');
                    if (result.split) {
                        document.getElementById('splitMeta').innerHTML = `
                            <div>切点：${Number(result.split.split_seconds).toFixed(2)} 秒</div>
                            <div>音频总长：${Number(result.split.audio_duration).toFixed(2)} 秒</div>
                            <div>切点能量：${result.split.energy_db} dB</div>
                        `;
                    }

                    if (result.status === 'SUCCESS') {
                        clearInterval(activePoller);
                        activePoller = null;
                        renderLocalResult(result);
                        setBusy(false);
                    } else if (result.status === 'FAILED') {
                        clearInterval(activePoller);
                        activePoller = null;
                        showProgress(0, `分段生成失败：${result.message}`);
                        setBusy(false);
                    }
                } catch (error) {
                    console.error(error);
                }
            }, 3000);
        }

        function renderRemoteResult(result) {
            const output = result.outputs && result.outputs.length > 0 ? result.outputs[0] : null;
            const url = output && output.url ? output.url : result.resultUrl;
            if (!url) {
                document.getElementById('videoResult').innerHTML = '<div class="status-text">没有找到视频输出地址</div>';
                return;
            }
            document.getElementById('videoResult').innerHTML = `
                <video controls>
                    <source src="${url}" type="video/mp4">
                    当前浏览器不支持视频播放
                </video>
                <a href="${url}" class="download-btn" target="_blank" rel="noreferrer">打开生成结果</a>
            `;
        }

        function renderLocalResult(result) {
            document.getElementById('videoResult').innerHTML = `
                <video controls>
                    <source src="${result.preview_url}" type="video/mp4">
                    当前浏览器不支持视频播放
                </video>
                <a href="${result.download_url}" class="download-btn">下载合并视频</a>
            `;
        }
    </script>
</body>
</html>
