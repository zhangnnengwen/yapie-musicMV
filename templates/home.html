<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐 MV 工具</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            color: #172033;
            background:
                radial-gradient(circle at 18% 20%, rgba(255, 129, 121, 0.22), transparent 28%),
                radial-gradient(circle at 84% 14%, rgba(78, 205, 196, 0.2), transparent 30%),
                linear-gradient(135deg, #f7f8ff 0%, #eef6f4 46%, #fff4ee 100%);
            padding: 48px 20px;
        }

        .shell {
            width: min(980px, 100%);
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 56px;
        }

        .brand {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0;
        }

        .status {
            padding: 8px 12px;
            border: 1px solid rgba(23, 32, 51, 0.12);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.7);
            color: #526173;
            font-size: 13px;
        }

        .hero {
            max-width: 720px;
            margin-bottom: 34px;
        }

        h1 {
            font-size: clamp(34px, 6vw, 60px);
            line-height: 1.08;
            letter-spacing: 0;
            margin-bottom: 18px;
        }

        .hero p {
            color: #526173;
            font-size: 17px;
            line-height: 1.7;
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .tool {
            min-height: 210px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 28px;
            padding: 28px;
            border: 1px solid rgba(23, 32, 51, 0.1);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.78);
            box-shadow: 0 18px 42px rgba(23, 32, 51, 0.1);
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .tool:hover {
            transform: translateY(-4px);
            border-color: rgba(23, 32, 51, 0.22);
            box-shadow: 0 22px 52px rgba(23, 32, 51, 0.14);
        }

        .tool h2 {
            font-size: 25px;
            margin-bottom: 10px;
            letter-spacing: 0;
        }

        .tool p {
            color: #526173;
            font-size: 15px;
            line-height: 1.65;
        }

        .enter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: fit-content;
            min-height: 42px;
            padding: 0 16px;
            border-radius: 6px;
            color: white;
            background: #172033;
            font-weight: 700;
            font-size: 14px;
        }

        .tool:nth-child(2) .enter {
            background: #0f766e;
        }

        @media (max-width: 720px) {
            body {
                padding: 28px 16px;
            }

            .topbar {
                align-items: flex-start;
                flex-direction: column;
                margin-bottom: 42px;
            }

            .actions {
                grid-template-columns: 1fr;
            }

            .tool {
                min-height: 180px;
                padding: 22px;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <div class="topbar">
            <div class="brand">音乐 MV 工具</div>
            <div class="status">本地服务运行中</div>
        </div>

        <section class="hero">
            <h1>选择要使用的功能</h1>
            <p>把视频加歌词字幕，或进入 RunningHub AI 应用生成视频。两个功能现在共用同一个网址入口。</p>
        </section>

        <section class="actions" aria-label="功能入口">
            <a class="tool" href="/lyrics">
                <div>
                    <h2>视频加歌词字幕</h2>
                    <p>上传视频和 LRC 歌词文件，设置字幕样式后生成带歌词的视频。</p>
                </div>
                <span class="enter">进入功能</span>
            </a>

            <a class="tool" href="/ai-video">
                <div>
                    <h2>RunningHub 视频生成</h2>
                    <p>填写 API Key 和 WebApp ID，读取节点参数并提交 AI 视频生成任务。</p>
                </div>
                <span class="enter">进入功能</span>
            </a>
        </section>
    </main>
</body>
</html>
