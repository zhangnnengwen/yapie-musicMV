<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 50%, #dfe6e9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        .player-container {
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 0;
            box-shadow: none;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .left-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #f5f5f5 0%, #e8e8e8 100%);
            padding: 60px;
        }

        .turntable {
            width: min(50vh, 450px);
            height: min(50vh, 450px);
            background: #fff;
            border-radius: 50%;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.15),
                inset 0 2px 10px rgba(0, 0, 0, 0.05);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vinyl-record {
            width: calc(min(50vh, 450px) - 40px);
            height: calc(min(50vh, 450px) - 40px);
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
            border-radius: 50%;
            position: relative;
            animation: spin 8s linear infinite;
            animation-play-state: paused;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .vinyl-record.playing {
            animation-play-state: running;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .vinyl-grooves {
            position: absolute;
            top: 15%;
            left: 15%;
            right: 15%;
            bottom: 15%;
            border-radius: 50%;
            background: repeating-radial-gradient(
                circle at center,
                transparent 0,
                transparent 2px,
                rgba(255, 255, 255, 0.03) 2px,
                rgba(255, 255, 255, 0.03) 4px
            );
        }

        .album-cover {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(20vh, 180px);
            height: min(20vh, 180px);
            border-radius: 12px;
            background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .album-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .album-cover::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background: #1a1a1a;
            border-radius: 50%;
            z-index: 10;
        }

        .tonearm {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 120px;
            height: 8px;
            background: linear-gradient(90deg, #8b8b8b 0%, #d0d0d0 50%, #8b8b8b 100%);
            transform-origin: right center;
            transform: rotate(-30deg);
            transition: transform 0.5s ease;
            border-radius: 4px;
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.2);
        }

        .tonearm.playing {
            transform: rotate(10deg);
        }

        .tonearm::before {
            content: '';
            position: absolute;
            right: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            background: linear-gradient(145deg, #c0c0c0, #a0a0a0);
            border-radius: 50%;
            border: 2px solid #8b8b8b;
        }

        .tonearm::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 50%;
            transform: translateY(-50%);
            width: 15px;
            height: 25px;
            background: linear-gradient(180deg, #6b6b6b, #4b4b4b);
            border-radius: 2px;
            transform-origin: top center;
            transform: translateY(-50%) rotate(20deg);
        }

        .cartridge {
            position: absolute;
            left: -5px;
            top: 12px;
            width: 8px;
            height: 8px;
            background: #2a2a2a;
            border-radius: 50%;
        }

        .right-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            padding: 60px;
            background: #fff;
            overflow: hidden;
        }

        .song-header {
            margin-bottom: 40px;
        }

        .song-title {
            font-size: 36px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .vip-badge {
            font-size: 14px;
            color: #fff;
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 500;
        }

        .artist-name {
            font-size: 20px;
            color: #666;
        }

        .song-meta {
            margin-bottom: 30px;
            padding-left: 2px;
        }

        .meta-item {
            font-size: 16px;
            color: #999;
            line-height: 2;
        }

        .lyrics-container {
            flex: 1;
            min-height: 300px;
            max-height: calc(100vh - 400px);
            overflow-y: auto;
            overflow-x: hidden;
            margin-bottom: 20px;
            position: relative;
            scrollbar-width: thin;
            scrollbar-color: #ccc #f0f0f0;
        }

        .lyrics-container::-webkit-scrollbar {
            width: 6px;
        }

        .lyrics-container::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 3px;
        }

        .lyrics-container::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .lyrics-container::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        .lyrics-wrapper {
            width: 100%;
            padding: 30px 0;
        }

        .lyric-line {
            padding: 10px 0;
            text-align: left;
            font-size: 18px;
            color: #ccc;
            transition: all 0.3s ease;
            line-height: 2.2;
        }

        .lyric-line.active {
            color: #333;
            font-size: 22px;
            font-weight: 500;
        }

        .bottom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: rgba(255, 255, 255, 0.98);
            border-top: 1px solid #eee;
            display: flex;
            align-items: center;
            padding: 0 60px;
            gap: 40px;
        }

        .mini-album {
            width: 55px;
            height: 55px;
            border-radius: 8px;
            background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            flex-shrink: 0;
        }

        .mini-album img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .mini-info {
            flex: 1;
            min-width: 0;
        }

        .mini-title {
            font-size: 16px;
            font-weight: 500;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mini-artist {
            font-size: 14px;
            color: #999;
        }

        .progress-section {
            flex: 2;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .progress-bar {
            flex: 1;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ee5a5a);
            border-radius: 4px;
            transition: width 0.1s linear;
        }

        .progress-dot {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            background: #ff6b6b;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s ease;
            box-shadow: 0 2px 10px rgba(255, 107, 107, 0.5);
        }

        .progress-bar:hover .progress-dot {
            opacity: 1;
        }

        .time-display {
            font-size: 14px;
            color: #999;
            min-width: 80px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .control-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: #666;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .control-btn:hover {
            background: #f0f0f0;
            color: #333;
        }

        .control-btn.play-btn {
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, #ff6b6b, #ee5a5a);
            color: white;
            font-size: 28px;
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }

        .control-btn.play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.5);
        }

        .control-btn.active-mode {
            color: #ff6b6b;
        }

        .right-icons {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-left: auto;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: #999;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .icon-btn:hover {
            background: #f0f0f0;
            color: #666;
        }

        .heart-btn {
            color: #ff6b6b;
        }

        @media (max-width: 768px) {
            .player-container {
                flex-direction: column;
                height: auto;
                max-height: 90vh;
            }

            .left-panel, .right-panel {
                width: 100%;
                padding: 20px;
            }

            .turntable {
                width: 220px;
                height: 220px;
            }

            .vinyl-record {
                width: 190px;
                height: 190px;
            }

            .album-cover {
                width: 70px;
                height: 70px;
            }

            .bottom-controls {
                flex-wrap: wrap;
                padding: 10px 20px;
                height: auto;
            }

            .progress-section {
                order: 3;
                width: 100%;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="left-panel">
            <div class="turntable">
                <div class="vinyl-record" id="vinylRecord">
                    <div class="vinyl-grooves"></div>
                    <div class="album-cover">
                        <img src="https://neeko-copilot.bytedance.net/api/text_to_image?prompt=music%20album%20cover%20art%20with%20abstract%20geometric%20shapes%20dark%20background&image_size=square" alt="专辑封面">
                    </div>
                </div>
                <div class="tonearm" id="tonearm">
                    <div class="cartridge"></div>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="song-header">
                <div class="song-title" id="songTitle">隔街<span class="vip-badge">VIP</span></div>
                <div class="artist-name" id="artistName">未知歌手</div>
            </div>

            <div class="song-meta">
                <div class="meta-item">隔街 - 未知歌手</div>
                <div class="meta-item">词: 未知</div>
                <div class="meta-item">曲: 未知</div>
                <div class="meta-item">编曲: 未知</div>
            </div>

            <div class="lyrics-container" id="lyricsContainer">
                <div class="lyrics-wrapper" id="lyricsWrapper">
                    <div class="lyric-line active">隔街</div>
                    <div class="lyric-line">走在隔街的夜晚</div>
                    <div class="lyric-line">灯光渐渐熄灭</div>
                    <div class="lyric-line">回忆在心中盘旋</div>
                    <div class="lyric-line">思念从未停歇</div>
                    <div class="lyric-line">风吹过街角</div>
                    <div class="lyric-line">带走你的温度</div>
                    <div class="lyric-line">留下孤独的脚步</div>
                    <div class="lyric-line">在这条隔街</div>
                    <div class="lyric-line">等待你的归来</div>
                    <div class="lyric-line">隔街的灯灭了</div>
                    <div class="lyric-line">心却还在亮着</div>
                    <div class="lyric-line">照亮前行的路</div>
                    <div class="lyric-line">直到你回来</div>
                </div>
            </div>
        </div>

        <div class="bottom-controls">
            <div class="mini-album">
                <img src="https://neeko-copilot.bytedance.net/api/text_to_image?prompt=music%20album%20cover%20art%20with%20abstract%20geometric%20shapes%20dark%20background&image_size=square" alt="专辑封面">
            </div>
            <div class="mini-info">
                <div class="mini-title" id="miniTitle">隔街</div>
                <div class="mini-artist" id="miniArtist">未知歌手</div>
            </div>

            <div class="progress-section">
                <span class="time-display" id="currentTime">00:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress" id="progress"></div>
                    <div class="progress-dot"></div>
                </div>
                <span class="time-display" id="totalTime">04:00</span>
            </div>

            <div class="controls">
                <button class="control-btn" id="shuffleBtn">&#x1F500;</button>
                <button class="control-btn" id="prevBtn">&#9664;</button>
                <button class="control-btn play-btn" id="playBtn">&#9654;</button>
                <button class="control-btn" id="nextBtn">&#9654;&#9654;</button>
                <button class="control-btn" id="repeatBtn">&#x21BA;</button>
            </div>

            <div class="right-icons">
                <button class="icon-btn heart-btn">&#x2764;</button>
                <button class="icon-btn">&#x1F4AC;</button>
                <button class="icon-btn">&#x2630;</button>
            </div>
        </div>
    </div>

    <script>
        const songs = [
            { title: '隔街', artist: '未知歌手', duration: 240, file: '隔街.mp3' },
            { title: '隔街的灯灭了', artist: '未知歌手', duration: 210, file: '隔街的灯灭了.mp3' }
        ];

        const lyricsData = [
            [
                { time: 0, text: '隔街' },
                { time: 5, text: '走在隔街的夜晚' },
                { time: 10, text: '灯光渐渐熄灭' },
                { time: 15, text: '回忆在心中盘旋' },
                { time: 20, text: '思念从未停歇' },
                { time: 25, text: '风吹过街角' },
                { time: 30, text: '带走你的温度' },
                { time: 35, text: '留下孤独的脚步' },
                { time: 40, text: '在这条隔街' },
                { time: 45, text: '等待你的归来' },
                { time: 50, text: '隔街的灯灭了' },
                { time: 55, text: '心却还在亮着' },
                { time: 60, text: '照亮前行的路' },
                { time: 65, text: '直到你回来' }
            ],
            [
                { time: 0, text: '隔街的灯灭了' },
                { time: 5, text: '夜色慢慢降临' },
                { time: 10, text: '街灯一盏盏熄灭' },
                { time: 15, text: '孤独在蔓延' },
                { time: 20, text: '思念在蔓延' },
                { time: 25, text: '隔街的灯灭了' },
                { time: 30, text: '心中的灯亮了' },
                { time: 35, text: '照亮你的脸庞' },
                { time: 40, text: '温暖我的心房' },
                { time: 45, text: '隔街的灯灭了' },
                { time: 50, text: '爱却永不熄灭' },
                { time: 55, text: '在心中燃烧' },
                { time: 60, text: '直到永远' }
            ]
        ];

        const audio = new Audio();
        let currentSongIndex = 0;
        let isPlaying = false;
        let currentLyricIndex = 0;
        let useMockAudio = false;
        let mockAudioInterval = null;
        let mockCurrentTime = 0;
        let isShuffle = false;
        let repeatMode = 0;
        let userScrollingLyrics = false;
        let lyricsScrollTimeout = null;

        const songTitle = document.getElementById('songTitle');
        const artistName = document.getElementById('artistName');
        const miniTitle = document.getElementById('miniTitle');
        const miniArtist = document.getElementById('miniArtist');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const progressBar = document.getElementById('progressBar');
        const progress = document.getElementById('progress');
        const progressDot = document.querySelector('.progress-dot');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const lyricsContainer = document.getElementById('lyricsContainer');
        const lyricsWrapper = document.getElementById('lyricsWrapper');
        const vinylRecord = document.getElementById('vinylRecord');
        const tonearm = document.getElementById('tonearm');

        function loadSong(index) {
            currentSongIndex = index;
            const song = songs[index];
            songTitle.textContent = song.title;
            artistName.textContent = song.artist;
            miniTitle.textContent = song.title;
            miniArtist.textContent = song.artist;
            totalTimeEl.textContent = formatTime(song.duration);
            
            audio.src = `mc/${encodeURIComponent(song.file)}`;
            audio.load();
            loadLyrics(index);
        }

        function loadLyrics(index) {
            const lyrics = lyricsData[index];
            lyricsWrapper.innerHTML = '';
            lyricsWrapper.style.transform = 'translateY(0)';
            lyrics.forEach((lyric, i) => {
                const line = document.createElement('div');
                line.className = 'lyric-line';
                line.textContent = lyric.text;
                line.dataset.time = lyric.time;
                line.dataset.index = i;
                lyricsWrapper.appendChild(line);
            });
            currentLyricIndex = 0;
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateProgress() {
            let duration = songs[currentSongIndex].duration;
            let currentTime = useMockAudio ? mockCurrentTime : (audio.currentTime || 0);
            
            if (duration > 0) {
                const percent = (currentTime / duration) * 100;
                progress.style.width = `${percent}%`;
                progressDot.style.left = `${percent}%`;
                currentTimeEl.textContent = formatTime(currentTime);
                updateLyrics(currentTime);
            }
        }

        function updateLyrics(currentTime) {
            const lyrics = lyricsData[currentSongIndex];
            
            for (let i = lyrics.length - 1; i >= 0; i--) {
                if (currentTime >= lyrics[i].time) {
                    if (i !== currentLyricIndex) {
                        currentLyricIndex = i;
                        
                        document.querySelectorAll('.lyric-line').forEach(line => {
                            line.classList.remove('active');
                        });
                        
                        const activeLine = document.querySelector(`.lyric-line[data-index="${i}"]`);
                        if (activeLine) {
                            activeLine.classList.add('active');
                            
                            if (!userScrollingLyrics) {
                                activeLine.scrollIntoView({
                                    behavior: 'smooth',
                                    block: 'center',
                                    inline: 'nearest'
                                });
                            }
                        }
                    }
                    break;
                }
            }
        }

        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                if (mockAudioInterval) {
                    clearInterval(mockAudioInterval);
                    mockAudioInterval = null;
                }
                playBtn.innerHTML = '&#9654;';
                vinylRecord.classList.remove('playing');
                tonearm.classList.remove('playing');
            } else {
                if (useMockAudio) {
                    mockCurrentTime = 0;
                    mockAudioInterval = setInterval(() => {
                        mockCurrentTime += 0.1;
                        if (mockCurrentTime >= songs[currentSongIndex].duration) {
                            nextSong();
                        } else {
                            updateProgress();
                        }
                    }, 100);
                } else {
                    audio.play().catch(e => {
                        console.log('Audio play failed, switching to mock mode:', e);
                        useMockAudio = true;
                        mockCurrentTime = 0;
                        mockAudioInterval = setInterval(() => {
                            mockCurrentTime += 0.1;
                            if (mockCurrentTime >= songs[currentSongIndex].duration) {
                                nextSong();
                            } else {
                                updateProgress();
                            }
                        }, 100);
                    });
                }
                playBtn.innerHTML = '&#9208;';
                vinylRecord.classList.add('playing');
                tonearm.classList.add('playing');
            }
            isPlaying = !isPlaying;
        }

        function prevSong() {
            if (mockAudioInterval) {
                clearInterval(mockAudioInterval);
                mockAudioInterval = null;
            }
            
            if (repeatMode === 2) {
                mockCurrentTime = 0;
                loadSong(currentSongIndex);
                if (isPlaying) {
                    if (useMockAudio) {
                        mockAudioInterval = setInterval(() => {
                            mockCurrentTime += 0.1;
                            if (mockCurrentTime >= songs[currentSongIndex].duration) {
                                nextSong();
                            } else {
                                updateProgress();
                            }
                        }, 100);
                    } else {
                        audio.currentTime = 0;
                        audio.play();
                    }
                }
                return;
            }
            
            if (isShuffle) {
                const randomIndex = Math.floor(Math.random() * songs.length);
                currentSongIndex = randomIndex;
            } else {
                currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
            }
            
            mockCurrentTime = 0;
            loadSong(currentSongIndex);
            if (isPlaying) {
                if (useMockAudio) {
                    mockAudioInterval = setInterval(() => {
                        mockCurrentTime += 0.1;
                        if (mockCurrentTime >= songs[currentSongIndex].duration) {
                            nextSong();
                        } else {
                            updateProgress();
                        }
                    }, 100);
                } else {
                    setTimeout(() => audio.play(), 100);
                }
            }
        }

        function nextSong() {
            if (mockAudioInterval) {
                clearInterval(mockAudioInterval);
                mockAudioInterval = null;
            }
            
            if (repeatMode === 2) {
                mockCurrentTime = 0;
                loadSong(currentSongIndex);
                if (isPlaying) {
                    if (useMockAudio) {
                        mockAudioInterval = setInterval(() => {
                            mockCurrentTime += 0.1;
                            if (mockCurrentTime >= songs[currentSongIndex].duration) {
                                nextSong();
                            } else {
                                updateProgress();
                            }
                        }, 100);
                    } else {
                        audio.currentTime = 0;
                        audio.play();
                    }
                }
                return;
            }
            
            let nextIndex;
            if (isShuffle) {
                nextIndex = Math.floor(Math.random() * songs.length);
                while (nextIndex === currentSongIndex && songs.length > 1) {
                    nextIndex = Math.floor(Math.random() * songs.length);
                }
            } else {
                nextIndex = (currentSongIndex + 1) % songs.length;
            }
            
            currentSongIndex = nextIndex;
            mockCurrentTime = 0;
            loadSong(currentSongIndex);
            if (isPlaying) {
                if (useMockAudio) {
                    mockAudioInterval = setInterval(() => {
                        mockCurrentTime += 0.1;
                        if (mockCurrentTime >= songs[currentSongIndex].duration) {
                            nextSong();
                        } else {
                            updateProgress();
                        }
                    }, 100);
                } else {
                    setTimeout(() => audio.play(), 100);
                }
            }
        }

        function seek(e) {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            const duration = songs[currentSongIndex].duration;
            const newTime = percent * duration;
            
            if (useMockAudio) {
                mockCurrentTime = newTime;
            } else {
                audio.currentTime = newTime;
            }
            updateProgress();
        }

        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);
        progressBar.addEventListener('click', seek);
        
        const shuffleBtn = document.getElementById('shuffleBtn');
        const repeatBtn = document.getElementById('repeatBtn');
        
        shuffleBtn.addEventListener('click', () => {
            isShuffle = !isShuffle;
            shuffleBtn.style.color = isShuffle ? '#ff6b6b' : '#666';
        });
        
        repeatBtn.addEventListener('click', () => {
            repeatMode = (repeatMode + 1) % 3;
            if (repeatMode === 0) {
                repeatBtn.innerHTML = '&#x21BA;';
                repeatBtn.style.color = '#666';
            } else if (repeatMode === 1) {
                repeatBtn.innerHTML = '&#x21BA;';
                repeatBtn.style.color = '#ff6b6b';
            } else {
                repeatBtn.innerHTML = '&#x1F502;';
                repeatBtn.style.color = '#ff6b6b';
            }
        });
        
        lyricsContainer.addEventListener('wheel', () => {
            userScrollingLyrics = true;
            clearTimeout(lyricsScrollTimeout);
            lyricsScrollTimeout = setTimeout(() => {
                userScrollingLyrics = false;
            }, 3000);
        });
        
        lyricsContainer.addEventListener('touchstart', () => {
            userScrollingLyrics = true;
            clearTimeout(lyricsScrollTimeout);
        });
        
        lyricsContainer.addEventListener('touchend', () => {
            lyricsScrollTimeout = setTimeout(() => {
                userScrollingLyrics = false;
            }, 3000);
        });
        
        audio.addEventListener('timeupdate', () => {
            if (!useMockAudio) {
                updateProgress();
            }
        });
        
        audio.addEventListener('loadedmetadata', () => {
            totalTimeEl.textContent = formatTime(audio.duration);
            songs[currentSongIndex].duration = audio.duration;
        });
        
        audio.addEventListener('ended', () => {
            if (repeatMode === 1) {
                nextSong();
            } else if (repeatMode === 2) {
                audio.currentTime = 0;
                audio.play();
            } else {
                nextSong();
            }
        });
        
        audio.addEventListener('canplay', () => {
            if (isPlaying && !useMockAudio) {
                audio.play();
            }
        });

        audio.volume = 0.7;
        loadSong(0);
    </script>
</body>
</html>
